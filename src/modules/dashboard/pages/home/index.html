<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Dashboard administrativo com navegação rápida entre os módulos do sistema." />
    <title>Dashboard | Área Restrita</title>
    <link rel="stylesheet" href="./../../../../shared/styles/base.css" />
    <link rel="stylesheet" href="./dashboard.css" />
  </head>
  <body>
    <main class="dashboard-shell">
      <header class="dashboard-topbar">
        <div class="brand">
          <span class="brand__badge" aria-hidden="true">◎</span>
          <div>
            <p class="eyebrow">Área restrita</p>
            <h1>Dashboard</h1>
          </div>
        </div>

        <div class="topbar-actions">
          <p class="session" id="sessionLabel">Sessão ativa</p>
          <button id="logoutButton" class="logout-button" type="button" aria-label="Sair do sistema">
            Sair
          </button>
        </div>
      </header>

      <section class="hero" aria-labelledby="hero-title">
        <div class="hero__content">
          <p class="eyebrow">Navegação</p>
          <h2 id="hero-title">Escolha um módulo para continuar.</h2>
          <p>Use os atalhos abaixo para abrir as áreas do sistema.</p>
        </div>
      </section>

      <section class="section">
        <div class="section__header">
          <div>
            <p class="eyebrow">Atalhos rápidos</p>
            <h3>Módulos e páginas principais</h3>
          </div>
        </div>

        <div id="navGrid" class="nav-grid" aria-label="Links de navegação"></div>
      </section>
    </main>

    <script src="./../../../../app/config/storage.js"></script>
    <script src="./dashboard.js" defer></script>
  </body>
</html>
