<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novo aluno • EBD</title>
  <meta
    name="description"
    content="Cadastrar novos alunos em uma página dedicada no GitHub Pages."
  />
  <link rel="stylesheet" href="../../src/css/base.css" />
  <link rel="stylesheet" href="../../src/css/layout.css" />
  <link rel="stylesheet" href="../../src/css/components.css" />
  <link rel="stylesheet" href="../../src/css/pages.css" />
  <link rel="stylesheet" href="../../src/css/utilities.css" />
  <script defer src="../../src/js/config/app.config.js"></script>
  <script defer src="../../src/js/utils/helpers.js"></script>
  <script defer src="../../src/js/utils/format.js"></script>
<script defer src="../../src/js/services/api.js"></script>
  <script defer src="../../src/js/services/memory.js"></script>
  <script defer src="../../src/js/pages/add-aluno-page.js"></script>
</head>
<body>
  <main class="app">
    <section class="panel card">
      <div class="panel__head">
        <div>
          <h2>Dados do aluno</h2>
        </div>

        <div class="panel__actions">
          <a id="addAlunoBackBtn" class="btn btn--ghost" href="../../index.html">Voltar</a>
        </div>
      </div>

      <div id="feedback" class="feedback" aria-live="polite"></div>
      <pre id="debugConsole" class="debug-console" aria-live="polite"></pre>
      <div id="studentAddLoading" class="empty-state">Carregando turmas...</div>

      <form id="studentAddForm" class="student-edit-form hidden">
        <div class="field">
          <label for="studentAddName">Nome do aluno</label>
          <input id="studentAddName" type="text" placeholder="Nome do Aluno" autocomplete="off" required />
        </div>

        <div class="field">
          <label for="studentAddCelular">Celular (opcional)</label>
          <input id="studentAddCelular" type="text" inputmode="numeric" placeholder="(XX) 9XXXX-XXXX" autocomplete="off" />
        </div>

        <div class="field">
          <label for="studentAddNascimento">Data de nascimento (opcional)</label>
          <input id="studentAddNascimento" type="date" autocomplete="off" />
        </div>

        <div class="field">
          <label for="studentAddTurma">Turma</label>
          <select id="studentAddTurma" required></select>
        </div>

        <div class="student-edit-form__actions">
          <a id="studentAddCancel" class="btn btn--ghost" href="../../index.html">Cancelar</a>
          <button class="btn btn--primary" type="submit">Adicionar aluno</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
